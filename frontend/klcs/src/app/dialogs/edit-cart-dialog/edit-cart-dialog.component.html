<dialog [id]="dialogId()" class="modal" (close)="_dialogClosed()">
  <div class="modal-box">
    <h3 class="text-lg font-bold mb-4">Shopping Cart</h3>
      <form method="dialog">
        @if (!scannerActive) {
          <klcs-shopping-cart />
        }
        <form #f="ngForm" method="dialog" (submit)="checkout()" class="mt-4 w-full">
          @if (!scannerActive) {
            <select name="paymentMethod" class="select select-primary w-full" [(ngModel)]="paymentMethod">
              <option disabled selected [ngValue]="0">Pick Payment Method</option>
              <option [ngValue]="1">Cash</option>
              <option [ngValue]="2">Card</option>
            </select>
            @if (paymentMethod > 0) {
              <input type="text" name="description" class="input input-bordered mt-2 w-full" placeholder="Description" alt="Description" [(ngModel)]="description"/>
            }   
            @if (paymentMethod == 2) {
              <div class="join w-full mt-2">
                <input name="accountId" type="text" placeholder="*AccountID" required class="input input-bordered join-item w-full invalid:border-red-500" pattern="^[0-9a-f]{8}-[0-9a-f]{4}-[0-5][0-9a-f]{3}-[089ab][0-9a-f]{3}-[0-9a-f]{12}$" [(ngModel)]="accountId" />
                <button class="btn btn-neutral join-item" type="button" (click)="scannerActive = true">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" class="h-6 w-6 fill-neutral-content">
                    <path d="M80-680v-200h200v80H160v120H80Zm0 600v-200h80v120h120v80H80Zm600 0v-80h120v-120h80v200H680Zm120-600v-120H680v-80h200v200h-80ZM700-260h60v60h-60v-60Zm0-120h60v60h-60v-60Zm-60 60h60v60h-60v-60Zm-60 60h60v60h-60v-60Zm-60-60h60v60h-60v-60Zm120-120h60v60h-60v-60Zm-60 60h60v60h-60v-60Zm-60-60h60v60h-60v-60Zm240-320v240H520v-240h240ZM440-440v240H200v-240h240Zm0-320v240H200v-240h240Zm-60 500v-120H260v120h120Zm0-320v-120H260v120h120Zm320 0v-120H580v120h120Z"/>
                  </svg>
                </button>
              </div>
            }     
          } @else {
            <zxing-scanner (scanSuccess)="onScanSuccess($event)" (scanError)="onScanError($event)" previewFitMode="scale-down"></zxing-scanner>
          }
          <div class="modal-action">
            <button class="btn btn-secondary" [disabled]="shoppingCart.getOrderItems().length <= 0 || paymentMethod <= 0 || f.invalid || scannerActive">Checkout</button>
            <form method="dialog">
              <button class="btn btn-outline btn-neutral">Close</button>
            </form>
          </div>
        </form>
      </form>
  </div>
</dialog>
