<div class="flex flex-col items-center m-2">
  <table class="table">
    <thead>
      <tr>
        <th>AccountID</th>
        <th>Holder</th>
        <th></th>
      </tr>
    </thead>
  
    <tbody>
      @for (account of accounts(); track $index) {
      <tr>
        <td>{{ account.Id }}</td>
        <td>{{ account.HolderName }}</td>
        <td>
          @if (account.Locked) {
            <div class="tooltip" data-tip="Unlock">
              <button class="btn btn-ghost btn-circle" (click)="setLocked(account, false)">
                <svg xmlns="http://www.w3.org/2000/svg"viewBox="0 -960 960 960" class="h-6 fill-error"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm0-80h480v-400H240v400Zm240-120q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80ZM240-160v-400 400Z"/></svg>
              </button>
            </div>
          } @else {
            <div class="tooltip" data-tip="Lock">
              <button class="btn btn-ghost btn-circle" (click)="setLocked(account, true)">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" class="h-6 fill-success"><path d="M240-640h360v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85h-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640Zm0 480h480v-400H240v400Zm240-120q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM240-160v-400 400Z"/></svg>
              </button>
            </div>
          }
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>
