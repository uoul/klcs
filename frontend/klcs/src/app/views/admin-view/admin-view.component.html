<div class="w-full h-full">
  <div class="flex flex-col items-center m-2">
    <table class="table">
      <thead>
        <tr>
          <th>Name</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (shop of shops(); track $index) {
          <tr>
            <td>{{ shop.Name }}</td>
            <td class="flex justify-end">
              <button class="btn btn-circle btn-ghost" (click)="deleteShop(shop)">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" class="fill-error w-6 h-6"><path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/></svg>
              </button>
              <button class="btn btn-circle btn-ghost" (click)="showEditDialog(shop)">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" class="fill-base-content w-6 h-6"><path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h357l-80 80H200v560h560v-278l80-80v358q0 33-23.5 56.5T760-120H200Zm280-360ZM360-360v-170l367-367q12-12 27-18t30-6q16 0 30.5 6t26.5 18l56 57q11 12 17 26.5t6 29.5q0 15-5.5 29.5T897-728L530-360H360Zm481-424-56-56 56 56ZM440-440h56l232-232-28-28-29-28-231 231v57Zm260-260-29-28 29 28 28 28-28-28Z"/></svg>
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
    <div data-tip="Add Shop" class="tooltip tooltip-bottom">
      <button class="btn btn-circle btn-ghost" (click)="showCreateDialog()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" class="fill-base-content w-6 h-6"><path d="M440-280h80v-160h160v-80H520v-160h-80v160H280v80h160v160Zm40 200q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>
      </button>
    </div>
    <klcs-create-shop-dialog [dialogId]="CREATE_DIALOG_ID" (shopCreated)="refresh()"/>
    <klcs-update-shop-dialog [dialogId]="EDIT_DIALOG_ID" [(shop)]="_currentSelectedShop" />
  </div>
</div>
