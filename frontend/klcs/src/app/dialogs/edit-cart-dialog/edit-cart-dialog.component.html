<dialog [id]="dialogId()" class="modal" (close)="dialogClosed.emit()">
  <div class="modal-box">
    <h3 class="text-lg font-bold">Create Printer</h3>
    <form #f="ngForm" method="dialog">
      <klcs-shopping-cart />
      <div class="modal-action">
        <button class="btn btn-secondary" [disabled]="f.invalid">Checkout</button>
        <form method="dialog">
          <button class="btn btn-outline btn-neutral">Close</button>
        </form>
      </div>
    </form>
  </div>
</dialog>
