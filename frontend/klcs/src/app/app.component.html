@if (loadingService.isLoading()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="flex flex-col items-center gap-4 bg-base-100 rounded-2xl shadow-xl p-8">
      <span class="loading loading-spinner loading-lg text-primary"></span>
      <span class="text-base-content text-sm font-medium">{{ "components.loading-overlay.LblLoading" | translate }}</span>
    </div>
  </div>
}
@if (authService.isLoggedIn() | async) {
  <div class="grid grid-cols-[auto_1fr] touch-manipulation">
    <klcs-app-bar></klcs-app-bar>
    <klcs-side-nav></klcs-side-nav>
    <div class="overflow-y-auto max-h-[calc(100dvh-3.5rem)]">
      <router-outlet />
    </div>
  </div>
  <klcs-notification-container />
} @else {
  <div class="flex w-screen h-screen justify-center align-middle">
    <span class="loading loading-dots loading-lg"></span>
  </div>
}
