<div class="w-full h-full flex flex-col xl:flex-row">
  <div class="w-full xl:w-1/2 px-2">
    @for (category of categories() | keyvalue; track $index) {
      <div class="collapse collapse-arrow bg-base-100 border border-base-300 my-1">
        <input type="checkbox" />
        <div class="collapse-title font-semibold">{{ category.key }}</div>
        <div class="collapse-content text-sm flex flex-wrap">
          @for (article of category.value; track $index) {
            @if (article.StockAmount === null || article.StockAmount > 0) {
              <klcs-cashdesk-article [article]="article" (articleClicked)="addToShoppingCart($event)"/>
            }
          }
        </div>
      </div>
    }
  </div>
  <div class="hidden xl:flex flex-col flex-grow">
    <klcs-shopping-cart />
    <button class="btn btn-secondary btn-outline my-1" (click)="showCheckout(false)">Checkout Cash</button>
    <button class="btn btn-secondary btn-outline my-1" (click)="showCheckout(true)">Checkout Card</button>
    <klcs-checkout-dialog [dialogId]="CHECKOUT_DIALOG_ID" [withCard]="checkoutCard()"/>
  </div>
  <div class="xl:hidden flex-grow flex flex-col justify-end sticky bottom-0">
    <div class="w-full h-16 bg-secondary text-xl flex items-center" (click)="showShoppingCartDialog()">
      <span class="font-bold ml-4 underline underline-offset-4">Total:</span>
      <span class="flex flex-grow justify-end mr-4">{{ shoppingCart.getSum() / 100 | currency: 'EUR' }}</span>
    </div>
  </div>
  <klcs-edit-cart-dialog [dialogId]="EDIT_CART_DIALOG_ID" />
</div>
