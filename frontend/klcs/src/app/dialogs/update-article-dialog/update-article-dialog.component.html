<dialog [id]="dialogId()" class="modal" (close)="dialogClosed.emit()">
  <div class="modal-box">
    <h3 class="text-lg font-bold">{{ "dialogs.update-article.Title" | translate }}</h3>
    <form #f="ngForm" class="mt-4" method="dialog" (submit)="updateArticle()">
      <fieldset class="fieldset flex flex-col">
        <label class="fieldset-label m-2">{{ "dialogs.update-article.LblName" | translate }}</label>
        <input name="name" type="text" class="input input-bordered" [(ngModel)]="article().Name" required/>
        
        <label class="fieldset-label m-2">{{ "dialogs.update-article.LblDescription" | translate }}</label>
        <input name="description" type="text" class="input input-bordered" [(ngModel)]="article().Description"/>

        <label class="fieldset-label m-2">{{ "dialogs.update-article.LblCategory" | translate }}</label>
        <input name="category" type="text" class="input input-bordered" [(ngModel)]="article().Category" required/>

        <label class="fieldset-label m-2">{{ "dialogs.update-article.LblPrice" | translate }}</label>
        <input name="price" type="number" class="input input-bordered" [(ngModel)]="_uiArticle().Price" required min="0.0" step=".01" pattern="^\d+(?:\.\d{1,2})?$"/>

        <label class="fieldset-label m-2">{{ "dialogs.update-article.LblAmount" | translate }}</label>
        <input name="amount" type="number" min="0" class="input input-bordered" [(ngModel)]="article().StockAmount"/>

        <label class="fieldset-label m-2">{{ "dialogs.update-article.LblPrinter" | translate }}</label>
        <select name="printer" class="select select-bordered" [(ngModel)]="_uiArticle().Printer" [compareWith]="comparePriner">
          <option [ngValue]="nonePrinter">{{ nonePrinter.Name }}</option>
          @for (p of printers(); track $index) {
            <option [ngValue]="p">{{ p.Name }}</option>
          }
        </select>
        
        <div class="modal-action">
          <button class="btn btn-secondary" [disabled]="f.invalid || isActive()">{{ "dialogs.update-article.BtnSave" | translate }}</button>
          <form method="dialog">
            <button class="btn btn-outline btn-neutral">{{ "dialogs.update-article.BtnClose" | translate }}</button>
          </form>
        </div>
      </fieldset>
    </form>
  </div>
</dialog>
